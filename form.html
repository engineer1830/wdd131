<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Week05 - Product Review Form Activity - Jesse Hamilton</title>
    <meta name="description" content="WDD 131 - Product Review Form Design Activity for Jesse Hamilton work">
    <meta name="author" content="Jesse Hamilton">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body class="page">
    <header>
        <h1>Product Review</h1>
        <nav>
            <a href="#">Home</a>
        </nav>
    </header>
<main>
    <form method="get" action="/wdd131/review.html?submitted=true" class="wf1">
        <fieldset>
            <label for="productName">Product Name</label>
                <select id="productName" name="subject" required>
                    <option value="" disabled selected>Select a Product . . . </option>
                </select>
                <label class="rating-label">Overall Rating</label>
                <div class="rating">
                <div class="rating-item">
                    <input type="radio" id="rating1" name="rating" value="one" required>
                    <label for="rating1">★</label>
                </div>
                <div class="rating-item">
                    <input type="radio" id="rating2" name="rating" value="two" required>
                    <label for="rating2">★★</label>
                </div>
                <div class="rating-item">
                    <input type="radio" id="rating3" name="rating" value="three" required>
                    <label for="rating3">★★★</label>
                </div>
                <div class="rating-item">
                    <input type="radio" id="rating4" name="rating" value="four" required>
                    <label for="rating4">★★★★</label>
                </div>
                <div class="rating-item">
                    <input type="radio" id="rating5" name="rating" value="five" required>
                    <label for="rating5">★★★★★</label>      
                </div>
            </div>
            <div class="date">
                <label for="installDate">Date of Installation</label>
                <input type="date" id="installDate" name="installDate" required>
            </div>
            <div class="features">
                <label for="durability"><input type="checkbox" id="durability" name="durability" value="yes"> Durability</label>
                <label for="use"><input type="checkbox" id="use" name="use" value="yes"> Ease of Use</label>
                <label for="performance"><input type="checkbox" id="performance" name="performance" value="yes"> Performance</label>
                <label for="design"><input type="checkbox" id="design" name="design" value="yes"> Design</label>
            </div>
            <div class="written">
                <label for="written">Written Review <span class="optional">(optional)</span></label>
                <textarea id="written" name="written" rows="4" placeholder="Share your experience..."></textarea>          
            </div>
            <div class="name">
                <label for="name">Your Name <span class="optional">(optional)</span></label>
                <input id="name" type="text" name="name">
            </div>
            <div class="submit">
                <input type="submit" value="Post Review">
            </div>
        </fieldset>
    </form>
</main>
<footer class="footer">
    <p>&copy; <span id="currentyear"></span> | Jesse Hamilton | USA</p>
    <p>Last Modification: <span id="lastModified"></span></p>
</footer>
</body>
</html>
