        <h3>Governing Philosophy</h3>
        <p>In today's information overload, you can find all the information that you desire to consume. However, it is
            critical
            to exercise extreme caution in the sources. In addition to finding reliable and trustworthy sources, one
            must Understand
            your individual comfort level with risk. Risk is not just about length of time between &quot;today&quot; and
            when the money is &quot;needed&quot;. Risk is also about personal preference. The adage of &quot;Greater
            Risk,
            Greater Reward&quot; is often stated without including the corollary of &quot;<strong>Greater Risk, Greater
                Potential Loss</strong>&quot;.
            In short, know your boundaries and be willing to adjust when you learn something new about your personal
            comfort level.
        </p>
        <h3>Know What You Know and Know What You Don't Know</h3>
        <p>Boundaries matter is many aspects of investing. A key boundary is establishing guardrails that protect you,

            real estate, crypto currency, and many other investment vehicles including different industries for many of

            options.). The rule is: <strong>IF YOU DON'T UNDERSTAND HOW THE VEHICLE and/or INDUSTRY WORK, DO NOT INVEST
